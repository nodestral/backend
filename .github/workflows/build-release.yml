name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: |
          CGO_ENABLED=1 go build -o nodestral-backend ./cmd/server/
          chmod +x nodestral-backend

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nodestral-backend
          path: nodestral-backend

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: nodestral-backend

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: nodestral-backend
          generate_release_notes: true
